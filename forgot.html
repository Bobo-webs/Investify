<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta property="og:title" content="Investify Traders" />
  <meta property="og:description"
    content="We help you achieve financial success across global markets, delivering real-time data and seamless trading for assets ranging from stocks and forex to crypto, indices, and CFDs." />
  <meta property="og:image" content="https://investifytraders.net/assets/images/logo-icon.jpg" />
  <meta property="og:url" content="https://investifytraders.net" />
  <title>Forgot Password - Investify</title>

  <!-- Styling --->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" href="./assets/images/logo-icon.jpg" />
  <link rel="stylesheet" href="./assets/css/account.css">
  <link rel="stylesheet" href="./assets/css/forgot.css">

  <!-- Scripts -->
  <script src="/assets/js/network-state.js"></script>
  <script src="/assets/js/toast.js"></script>
  <script type="module" src="/assets/js/firebase-init.js"></script>

</head>

<body>

  <div class="page-wrapper">

    <button class="theme-btn" id="themeToggle" aria-label="Toggle light/dark mode">
      <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>

    <div class="forgot-card">

      <a href="index.html" class="auth-logo">
        <img src="./assets/images/logo-icon.jpg" alt="Investify" />
        <span>Investify</span>
      </a>

      <div class="icon-badge">
        <i class="fa-solid fa-lock"></i>
      </div>

      <p class="card-title">Forgot your password?</p>
      <p class="card-sub">Enter the email linked to your account and we'll send you a reset link.</p>

      <div class="field" id="email-field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <div class="field-msg" id="email-msg"></div>
      </div>

      <button class="btn-submit" id="submit">
        <span class="btn-label"><i class="fa-solid fa-paper-plane"></i>&nbsp; Send Reset Link</span>
        <span class="spinner-sm"></span>
      </button>

      <a href="account.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to sign in
      </a>

    </div>

  </div>

  <script>
    // ── Theme ──
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('theme-icon');

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeIcon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      localStorage.setItem('investify_theme', theme);
    }

    const saved = localStorage.getItem('investify_theme');
    applyTheme(saved === 'light' ? 'light' : 'dark');

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });
  </script>
  <script type="module" src="./assets/js/forgot.js"></script>

</body>

</html>
